<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>  
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <div class="weather-card"> 
            <div class="temp">29°</div> 
            <div class="sunrise-wrapper">
                <div class="sunrise-pic"></div>
            </div>
            <div class="city-name">Delhi</div>
            <div class="weather-info">
                <div class="h1">
                    <img>
                    <div class="humidity">
                        <span>Humidity</span>
                        <br>
                        <span>35%</span>
                    </div>
                </div>
                <div class="uv1">
                    <img>
                    <div class="uv">
                        <span>UV</span>
                        <br>
                        <span>1</span>
                    </div>
                </div>
                <div class="pressure1">
                    <div class="pressure">
                        <span>Pressure</span>
                        <br>
                        <span>999 hPa</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
